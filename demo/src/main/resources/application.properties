# 1. Conexión al MySQL de XAMPP
# Usamos 127.0.0.1 para evitar problemas de red en Windows
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/proyectobbackenduniremington2026?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
# En XAMPP, por defecto, la contraseña de root está vacía
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Esto ayuda a Spring Boot 3 a entenderse mejor con el MySQL de XAMPP
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 3. Servidor
server.port=8080